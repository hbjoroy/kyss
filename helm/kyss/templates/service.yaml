apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-kyss
  labels:
    {{- include "kyss.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.kyss.port }}
      targetPort: {{ .Values.kyss.port }}
      protocol: TCP
  selector:
    {{- include "kyss.selectorLabels" . | nindent 4 }}
